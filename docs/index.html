<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1e1e2e">
    <meta name="description" content="github-db.js — Documentation">
    <title>github-db.js Docs</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  </head>
  <body>

    <div class="prog-bar" id="progBar" aria-hidden="true"></div>

    <div class="cmd-palette" id="cmdPalette" role="dialog" aria-modal="true" aria-label="Search" aria-hidden="true">
      <div class="cmd-backdrop"></div>
      <div class="cmd-modal">
        <div class="cmd-input-row">
          <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
          <input type="text" id="cmdInput" placeholder="Search file content…" autocomplete="off" spellcheck="false" aria-label="Search content">
          <kbd class="cmd-kbd">ESC</kbd>
        </div>
        <ul class="cmd-results" id="cmdResults" role="listbox" aria-label="Results"></ul>
      </div>
    </div>

    <div class="toasts" id="toasts" aria-live="polite" aria-atomic="true"></div>

    <div id="app">

      <header class="top-bar">
        <div class="bar-left">
          <button class="menu-btn" id="menuBtn" aria-label="Toggle sidebar" aria-expanded="false">
            <i class="fa-solid fa-bars" aria-hidden="true"></i>
          </button>
          <div class="brand" aria-label="github-db.js">
            <div class="brand-icon" aria-hidden="true">
              <i class="fa-solid fa-database"></i>
            </div>
            <div class="brand-text">
              <span class="brand-name">github-db.js</span>
              <span class="brand-sub">Documentation</span>
            </div>
          </div>
        </div>

        <nav class="tabs" id="tabs" aria-label="Documentation files">
          <button class="tab active" data-file="README.md" aria-selected="true">
            <span class="tab-glow" aria-hidden="true"></span>
            <i class="fa-regular fa-file-lines" aria-hidden="true"></i>
            <span class="tab-label">README</span>
          </button>
          <button class="tab" data-file="CHANGELOG.md" aria-selected="false">
            <span class="tab-glow" aria-hidden="true"></span>
            <i class="fa-solid fa-clock-rotate-left" aria-hidden="true"></i>
            <span class="tab-label">Changelog</span>
          </button>
          <button class="tab" data-file="ToDo.md" aria-selected="false">
            <span class="tab-glow" aria-hidden="true"></span>
            <i class="fa-solid fa-list-check" aria-hidden="true"></i>
            <span class="tab-label">To-do</span>
          </button>
        </nav>

        <div class="bar-right">
          <button class="glass-btn search-btn" id="searchBtn" aria-label="Search content (⌘K)">
            <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
            <span class="search-hint" aria-hidden="true">
              <kbd>⌘</kbd><kbd>K</kbd>
            </span>
          </button>
          <div class="file-badge" id="fileBadge" aria-live="polite">
            <i class="fa-regular fa-file-code" aria-hidden="true"></i>
            <span>README.md</span>
          </div>
        </div>
      </header>

      <div class="layout">

        <aside class="sidebar glass-panel" id="sidebar" aria-label="Table of contents">
          <div class="sidebar-head">
            <div class="sidebar-title">
              <i class="fa-solid fa-list-ul" aria-hidden="true"></i>
              <h2>Contents</h2>
            </div>
            <span class="toc-count" id="tocCount" aria-label="Heading count">0</span>
          </div>
          <div class="toc-filter">
            <i class="fa-solid fa-filter" aria-hidden="true"></i>
            <input type="text" id="tocFilter" placeholder="Filter headings…" autocomplete="off" spellcheck="false" aria-label="Filter table of contents">
          </div>
          <ul class="toc-list" id="tocList" role="list" aria-label="Table of contents"></ul>
        </aside>

        <main class="content" id="content" tabindex="0">
          <div class="status">
            <div class="spinner" aria-hidden="true">
              <div></div><div></div><div></div><div></div>
            </div>
            <span>Loading documentation…</span>
          </div>
        </main>

      </div>

      <button class="top-btn" id="topBtn" aria-label="Scroll back to top">
        <i class="fa-solid fa-arrow-up" aria-hidden="true"></i>
      </button>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <script src="./app.js" defer></script>
  </body>
</html>
